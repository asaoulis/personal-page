name: update-events

# Scheduled inference worker (M-D1 skeleton). Polls the catalogue, runs inference
# (MOCK for now — real NPE is M-D2), and publishes the v2 contract to the `data`
# branch the frontend reads. Cron is BEST-EFFORT (see docs/ARCHITECTURE.md §6.5):
# it can run late or be skipped; trigger manually via workflow_dispatch if needed.
# RETIRED 2026-07-11: superseded by live-inference.yml (real NPE). The cron is removed so
# this mock can never clobber the real store on the `data` branch; dispatch kept for archaeology.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-events
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout worker code (main)
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install worker deps
        run: pip install -r worker/requirements.txt

      # Restore the previous results + state.json so the stateful worker resumes
      # (archive into _data with no effect on the main index).
      - name: Seed previous results from the data branch
        run: |
          mkdir -p _data
          if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git fetch --depth=1 origin data
            git archive FETCH_HEAD | tar -x -C _data
          fi

      - name: Run worker (mock inference — real NPE is M-D2)
        working-directory: worker
        run: python -m fnet_monitor.run --out ../_data --source usgs

      # Publish as an orphan, force-pushed branch → JSON-only, no history bloat.
      - name: Publish to the data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd _data
          rm -rf .git
          git init -q -b data
          git config user.name "fnet-bot"
          git config user.email "fnet-bot@users.noreply.github.com"
          git add -A
          git commit -q -m "events: $(date -u +%FT%TZ)" || { echo "no changes"; exit 0; }
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" data
